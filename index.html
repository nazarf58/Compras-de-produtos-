<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Design® | By Nazael Giblin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .bg-cyber {
            background-image: linear-gradient(rgba(2, 6, 23, 0.94), rgba(2, 6, 23, 0.98)), 
                              url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1470&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-premium { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-premium:active { transform: scale(0.95); opacity: 0.9; }
        .nav-active { color: #3b82f6 !important; transform: translateY(-3px); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-cyber min-h-screen pb-44">

    <header class="p-6 sticky top-0 z-50 flex justify-between items-center bg-[#020617]/85 backdrop-blur-xl border-b border-white/5">
        <div>
            <h1 class="text-2xl font-black tracking-tighter italic uppercase">START <span class="text-blue-500">DESIGN®</span></h1>
            <div id="status-badge" class="text-[8px] font-bold px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 uppercase tracking-widest mt-1 border border-blue-500/20">Acesso Cliente</div>
        </div>
        <button onclick="openLogin()" class="p-3 glass rounded-2xl hover:bg-white/10 transition-colors">
            <i data-lucide="lock-keyhole" class="w-5 h-5"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-8">
        
        <section id="view-catalogo" class="animate-up space-y-6">
            <div class="p-8 rounded-[2.5rem] bg-gradient-to-br from-blue-700 to-blue-950 text-white shadow-2xl relative overflow-hidden border border-white/10">
                <div class="relative z-10">
                    <h2 class="text-[10px] font-black opacity-60 mb-2 tracking-[0.3em] uppercase">Premium Hub</h2>
                    <p class="text-3xl font-black leading-tight">Criações que <br>impactam.</p>
                </div>
                <i data-lucide="layers" class="absolute -right-4 -bottom-4 w-32 h-32 opacity-10 transform rotate-12"></i>
            </div>
            <div id="lista-servicos" class="grid gap-4"></div>
        </section>

        <section id="view-portfolio" class="hidden animate-up space-y-6">
            <div class="text-center py-4">
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Nosso Portfólio</h2>
                <div class="w-12 h-1 bg-blue-500 mx-auto mt-2 rounded-full"></div>
            </div>
            <div class="grid grid-cols-2 gap-4" id="portfolio-grid">
                <div class="glass rounded-3xl overflow-hidden aspect-square border-white/5 bg-slate-900 shadow-lg">
                    <img src="https://images.unsplash.com/photo-1572044162444-ad60f128bde3?w=400" class="w-full h-full object-cover opacity-70">
                </div>
                <div class="glass rounded-3xl overflow-hidden aspect-square border-white/5 bg-slate-900 shadow-lg">
                    <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?w=400" class="w-full h-full object-cover opacity-70">
                </div>
                <div class="glass rounded-3xl overflow-hidden aspect-square border-white/5 bg-slate-900 shadow-lg">
                    <img src="https://images.unsplash.com/photo-1626785774573-4b799315345d?w=400" class="w-full h-full object-cover opacity-70">
                </div>
                <div class="glass rounded-3xl overflow-hidden aspect-square border-white/5 bg-slate-900 shadow-lg">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400" class="w-full h-full object-cover opacity-70">
                </div>
            </div>
        </section>

        <section id="view-pagamento" class="hidden animate-up">
            <button onclick="changeView('catalogo')" class="mb-6 flex items-center gap-2 text-slate-500 font-black text-[10px] tracking-widest uppercase">
                <i data-lucide="chevron-left" class="w-4 h-4"></i> Voltar
            </button>
            <div class="glass p-8 rounded-[3rem] shadow-2xl">
                <div id="checkout-box" class="text-center mb-8"></div>
                
                <div class="space-y-6">
                    <div class="p-5 bg-blue-500/5 rounded-3xl border border-blue-500/20 text-center">
                        <p class="text-[8px] font-black text-blue-500 tracking-[0.2em] uppercase mb-2">IBAN Oficial (Pagar 50%)</p>
                        <p class="font-mono text-[11px] text-white font-black select-all tracking-wider">AO06.0055.0000.6819.3454.1014.2</p>
                    </div>

                    <div class="space-y-4">
                        <input type="text" id="cliente-nome" placeholder="Seu Nome" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 text-sm font-bold placeholder:text-slate-600">
                        <input type="tel" id="cliente-tel" placeholder="Seu WhatsApp" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 text-sm font-bold placeholder:text-slate-600">
                        
                        <div class="relative group">
                            <input type="file" id="arquivo-cliente" class="hidden" onchange="handleFileUpload(this)">
                            <button onclick="document.getElementById('arquivo-cliente').click()" class="w-full p-5 rounded-2xl border-2 border-dashed border-white/10 bg-white/5 group-hover:bg-white/10 transition-all flex flex-col items-center gap-2">
                                <i data-lucide="upload-cloud" id="upload-icon" class="text-blue-500"></i>
                                <span id="file-name-display" class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Anexar Briefing/Logo</span>
                            </button>
                        </div>
                    </div>

                    <button id="btn-finalizar" onclick="enviarPedido()" class="w-full btn-premium text-white py-5 rounded-[1.8rem] font-black text-lg shadow-lg shadow-blue-900/20 uppercase tracking-tighter flex items-center justify-center gap-3">
                        Enviar Pedido <i data-lucide="zap" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </section>

        <section id="view-admin" class="hidden animate-up space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black italic uppercase">Gestão <span class="text-red-500">Admin</span></h2>
                <button onclick="logout()" class="p-3 bg-red-500/10 text-red-500 rounded-2xl border border-red-500/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
            <div id="admin-pedidos" class="space-y-4"></div>
        </section>

        <footer class="mt-20 py-12 border-t border-white/5 text-center space-y-4">
            <div class="opacity-30 flex justify-center gap-4">
                <i data-lucide="figma" class="w-4 h-4"></i>
                <i data-lucide="framer" class="w-4 h-4"></i>
                <i data-lucide="pen-tool" class="w-4 h-4"></i>
            </div>
            <p class="text-[9px] font-black tracking-[0.5em] text-slate-600 uppercase">Start Design® Angola</p>
            <p class="text-[10px] font-medium text-slate-500 leading-relaxed max-w-[280px] mx-auto italic">
                Esta APP foi projetada e desenvolvida por <br>
                <span class="text-blue-500 font-black not-italic text-xs uppercase tracking-normal">Nazael Diniz Alves Primo Giblin</span>
            </p>
        </footer>
    </main>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-[2.5rem] p-4 flex justify-around items-center z-50 border border-white/10 shadow-2xl">
        <button id="nav-loja" onclick="changeView('catalogo')" class="flex flex-col items-center gap-1 transition-all nav-active">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            <span class="text-[8px] font-black tracking-widest">LOJA</span>
        </button>
        <button id="nav-portfolio" onclick="changeView('portfolio')" class="flex flex-col items-center gap-1 text-slate-500 transition-all">
            <i data-lucide="layout" class="w-6 h-6"></i>
            <span class="text-[8px] font-black tracking-widest">PORTFÓLIO</span>
        </button>
        <button onclick="openLogin()" class="flex flex-col items-center gap-1 text-slate-500">
            <i data-lucide="fingerprint" class="w-6 h-6"></i>
            <span class="text-[8px] font-black tracking-widest">ADMIN</span>
        </button>
    </nav>

    <div id="login-modal" class="fixed inset-0 bg-black/95 backdrop-blur-2xl hidden z-[100] items-center justify-center p-6">
        <div class="glass w-full max-w-xs rounded-[3rem] p-10 text-center border-white/10 shadow-3xl">
            <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-8 border border-blue-500/20">
                <i data-lucide="shield-check" class="text-blue-500 w-10 h-10"></i>
            </div>
            <h3 class="text-xl font-black mb-6 tracking-tighter uppercase italic">Master Access</h3>
            <input type="password" id="pass-field" placeholder="••••••••" class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl mb-4 text-center font-bold text-white outline-none focus:border-blue-500 transition-all">
            <button onclick="checkAdmin()" class="w-full btn-premium py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em]">Entrar no Sistema</button>
            <button onclick="closeLogin()" class="mt-6 text-slate-600 text-[10px] font-black uppercase tracking-widest">Cancelar</button>
        </div>
    </div>

    <script>
        const MASTER_CODE = "Dinizfilipe58"; 
        const WHATS_ADMIN = "244923002202";

        const CATALOGO = [
            { id: 1, n: 'Branding Completo', p: 15000, i: 'component' },
            { id: 2, n: 'Cartão Premium', p: 3500, i: 'credit-card' },
            { id: 3, n: 'Flyer Digital', p: 3000, i: 'monitor' },
            { id: 4, n: 'Edição de Vídeo', p: 8000, i: 'video' },
            { id: 5, n: 'Logotipo Express', p: 5500, i: 'target' }
        ];

        let state = { isAdmin: localStorage.getItem('isAdminStart') === 'true', carrinho: null, tempFileName: "Sem anexo" };

        function init() {
            renderList();
            refreshUI();
            lucide.createIcons();
            if(state.isAdmin) loadPedidosAdmin();
        }

        function handleFileUpload(input) {
            if(input.files.length > 0) {
                state.tempFileName = input.files[0].name;
                document.getElementById('file-name-display').innerText = "ARQUIVO: " + state.tempFileName.toUpperCase();
                document.getElementById('file-name-display').classList.replace('text-slate-500', 'text-blue-400');
                document.getElementById('upload-icon').classList.add('animate-bounce');
            }
        }

        function renderList() {
            const list = document.getElementById('lista-servicos');
            list.innerHTML = CATALOGO.map(s => `
                <div class="glass p-5 rounded-[2.2rem] flex justify-between items-center active:bg-white/5 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500">
                            <i data-lucide="${s.i}" class="w-6 h-6"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-white text-sm uppercase tracking-tighter">${s.n}</h3>
                            <p class="text-blue-500 font-black text-lg">${s.p.toLocaleString()} Kz</p>
                        </div>
                    </div>
                    <button onclick="goPay(${s.id})" class="btn-premium text-white px-5 py-3 rounded-2xl font-black text-[10px] uppercase tracking-tighter">Pedir</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeView(v) {
            ['view-catalogo', 'view-portfolio', 'view-pagamento', 'view-admin'].forEach(x => document.getElementById(x).classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            
            document.getElementById('nav-loja').classList.toggle('nav-active', v === 'catalogo');
            document.getElementById('nav-portfolio').classList.toggle('nav-active', v === 'portfolio');
            
            window.scrollTo(0,0);
        }

        function goPay(id) {
            state.carrinho = CATALOGO.find(x => x.id === id);
            const sinal = state.carrinho.p * 0.5;
            document.getElementById('checkout-box').innerHTML = `
                <div class="w-20 h-20 bg-blue-500/10 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6 text-blue-500 border border-blue-500/20">
                    <i data-lucide="banknote" class="w-10 h-10"></i>
                </div>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">Sinal de Entrada (50%)</p>
                <h3 class="text-5xl font-black text-white italic tracking-tighter">${sinal.toLocaleString()} <span class="text-sm opacity-40 not-italic">Kz</span></h3>
            `;
            changeView('pagamento');
            lucide.createIcons();
        }

        function enviarPedido() {
            const nome = document.getElementById('cliente-nome').value;
            const tel = document.getElementById('cliente-tel').value;
            if(!nome || !tel) return alert("Por favor, preencha seus dados.");

            const pedido = {
                id: Date.now(),
                cliente: nome, whatsapp: tel,
                servico: state.carrinho.n, data: new Date().toLocaleString(),
                arquivo: state.tempFileName
            };

            let pedidos = JSON.parse(localStorage.getItem('start_design_orders') || '[]');
            pedidos.push(pedido);
            localStorage.setItem('start_design_orders', JSON.stringify(pedidos));

            const sinal = state.carrinho.p * 0.5;
            const msg = `Olá Start Design! Me chamo ${nome}. Fiz o pedido de: ${state.carrinho.n}. Arquivo enviado: ${state.tempFileName}. Vou pagar o sinal de ${sinal.toLocaleString()} Kz agora.`;
            window.open(`https://wa.me/${WHATS_ADMIN}?text=${encodeURIComponent(msg)}`);
            
            // Reset
            state.tempFileName = "Sem anexo";
            document.getElementById('cliente-nome').value = "";
            document.getElementById('cliente-tel').value = "";
            changeView('catalogo');
        }

        function loadPedidosAdmin() {
            const container = document.getElementById('admin-pedidos');
            const pedidos = JSON.parse(localStorage.getItem('start_design_orders') || '[]');
            if(pedidos.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 font-black uppercase text-xs tracking-[0.5em]">Sem registros</div>`;
                return;
            }
            container.innerHTML = pedidos.map(p => `
                <div class="glass p-6 rounded-[2.5rem] text-left animate-up">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[8px] font-black bg-blue-600 text-white px-3 py-1 rounded-full uppercase tracking-widest">${p.data}</span>
                        <i data-lucide="box" class="w-4 h-4 text-blue-500"></i>
                    </div>
                    <h4 class="font-black text-xl text-white mb-1 uppercase italic">${p.servico}</h4>
                    <p class="text-xs font-bold text-slate-500 mb-6">${p.cliente} • ${p.whatsapp}</p>
                    <div class="p-4 bg-white/5 rounded-2xl border border-white/5 mb-5">
                        <p class="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-1">Ficheiro Enviado:</p>
                        <p class="text-[10px] text-white font-bold truncate">${p.arquivo}</p>
                    </div>
                    <a href="https://wa.me/244${p.whatsapp}" target="_blank" class="w-full bg-green-500/10 text-green-500 py-4 rounded-2xl text-[10px] font-black uppercase flex items-center justify-center gap-2 border border-green-500/10 active:bg-green-500/20">
                        Atender no WhatsApp
                    </a>
                </div>
            `).reverse().join('');
            lucide.createIcons();
        }

        function checkAdmin() {
            if(document.getElementById('pass-field').value === MASTER_CODE) {
                state.isAdmin = true;
                localStorage.setItem('isAdminStart', 'true');
                closeLogin();
                refreshUI();
                loadPedidosAdmin();
                changeView('admin');
                document.getElementById('pass-field').value = "";
            } else { alert("Código de Admin Inválido!"); }
        }

        function logout() {
            state.isAdmin = false;
            localStorage.setItem('isAdminStart', 'false');
            refreshUI();
            changeView('catalogo');
        }

        function refreshUI() {
            const badge = document.getElementById('status-badge');
            badge.innerText = state.isAdmin ? "Administrador Registado" : "Acesso Cliente";
            badge.classList.toggle('text-red-500', state.isAdmin);
            badge.classList.toggle('bg-red-500/10', state.isAdmin);
            lucide.createIcons();
        }

        function openLogin() { document.getElementById('login-modal').classList.replace('hidden', 'flex'); }
        function closeLogin() { document.getElementById('login-modal').classList.replace('flex', 'hidden'); }

        init();
    </script>
</body>
</html>
